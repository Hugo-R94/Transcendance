<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>




<div class="relative grid min-h-screen grid-cols-[1fr_2.5rem_auto_2.5rem_1fr] grid-rows-[1fr_1px_auto_1px_1fr] bg-white [--pattern-fg:var(--color-gray-950)]/5 dark:bg-gray-950 dark:[--pattern-fg:var(--color-white)]/10">




 <div class="absolute h-full w-full sm:w-1/2 bg-[#3cb58f] flex justify-center items-center">
   <div class="flex flex-col h-100 w-75  rounded-2xl ">
     <div class="m-auto">
     <div class="mb-4 mt-3 w-70 ml-auto mr-auto">
       <label for="email" class="block text-sm font-medium text-white/85 mb-1.5">Adresse e-mail</label>
       <div class="relative">
         <input id="email" type="email" placeholder="vous@exemple.com" autocomplete="email"
           class="w-full h-10 pl-9 pr-3 rounded-lg bg-white/10 border border-white/25 text-white placeholder-white/35 text-sm outline-none focus:border-white/60 focus:bg-white/15 focus:ring-2 focus:ring-white/10 transition" />
       </div>
       <p id="email-error" class="text-xs text-red-300 mt-1 hidden">Adresse e-mail invalide</p>
     </div>




     <div class="mb-4 mt-3 w-70 ml-auto mr-auto">
       <label for="password" class="block text-sm font-medium text-white/85 mb-1.5">Mot de passe</label>
       <div class="relative">
         <input id="password" type="password" placeholder="Mon mot de passe" autocomplete="email"
           class="w-full h-10 pl-9 pr-3 rounded-lg bg-white/10 border border-white/25 text-white placeholder-white/35 text-sm outline-none focus:border-white/60 focus:bg-white/15 focus:ring-2 focus:ring-white/10 transition" />
       </div>
       <p id="password-error" class="text-xs text-red-300 mt-1 hidden">password invalid</p>
     </div>




     <div class="mb-4 mt-3 w-70 ml-auto mr-auto">
       <label for="password" class="block text-sm font-medium text-white/85 mb-1.5">repetez le mot de passe</label>
       <div class="relative">
         <input id="checkpass" type="password" placeholder="Mon mot de passe" autocomplete="email"
           class="w-full h-10 pl-9 pr-3 rounded-lg bg-white/10 border border-white/25 text-white placeholder-white/35 text-sm outline-none focus:border-white/60 focus:bg-white/15 focus:ring-2 focus:ring-white/10 transition" />
       </div>
       <p id="checkpass-error" class="text-xs text-red-300 mt-1 hidden">password are differents.</p>
     </div>




     <button id="submit-btn" type="button" onclick="handleSubmit()"
       class="shadow-lg shadow-black w-70  mt-3 m-auto h-11 bg-[#3cb58f] hover:bg-[#2da07e] active:scale-95 text-white font-medium text-sm rounded-lg flex items-center justify-center gap-2 transition cursor-pointer">
       S'inscrire
     </button>
   </div>
  </div>
</div>








<div class="absolute right-0 h-full w-0 sm:w-1/2 bg-[#519385]">
  <img src="https://rahft.com/wp-content/uploads/missluuva_The_best_social_media_platforms_for_gaming_Where_game_1ee9508f-4093-45ec-9be9-10f198440cd4.png.webp" class=" object-none zoom-200 h-full w-full" />
</div>
</div>












<script>




   async function handleSubmit() {
   const email = document.getElementById("email").value;
   const password = document.getElementById("password").value;
   const checkpass = document.getElementById("checkpass").value;


 // Validation simple avant envoi
 if (password !== checkpass) {
   document.getElementById("checkpass-error").classList.remove("hidden");
   return;
 }
 document.getElementById("checkpass-error").classList.add("hidden");


 const data = {
   email: email,
   password: password,
 };


 try {
   const response = await fetch("http://localhost/api/user", {
     method: "POST",
     headers: {
       "Content-Type": "application/json",
     },
     body: JSON.stringify(data),
   });


   if (!response.ok) {
     throw new Error(`Erreur serveur: ${response.status}`);
   }


   const result = await response.json();
   console.log("Succès:", result);
   // ex: rediriger l'utilisateur, afficher un message de succès...


 } catch (error) {
   console.error("Erreur lors de l'envoi:", error);
   // ex: afficher un message d'erreur à l'utilisateur
 }
}
</script>

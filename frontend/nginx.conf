server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback : nécessaire pour react-router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # cache long pour les assets buildés (hashés par Vite)
    location ~* \.(?:css|js|svg|png|jpg|jpeg|gif|ico|woff2?)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }
}
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>



<style>
  @keyframes message-in {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .message-enter {
    animation: message-in 0.25s ease-out;
  }
</style>

<div class="grid min-h-screen place-items-center bg-gray-900">

  <div id="chatbox" class="flex flex-col bg-[#00509f] h-90 w-70 absolute right-0 bottom-0 p-1.5 rounded-lg my-4 mx-auto shadow-sm shadow-black overflow-hidden transition-all duration-300 ease-in-out">

    <div class="flex w-full h-15 bg-[#fb4740] rounded-lg p-1.5 shrink-0">
      <button class=" w-12 h-12 rounded-full hover:bg-[#ffaa00] overflow-hidden hover:scale-105">
		  <a href="#"><img src="https://www.vicharkness.co.uk/wp-content/uploads/2019/03/aiface.png" class="m-auto "></img></a>
  
	  </button>
      <a href="#" class="m-auto ml-2 font-semibold text-gray-700">Name</a>
      <button id="toggle-btn" onclick="reduceChat()" class="bg-[#00509f] hover:bg-sky-400 h-full w-12 rounded-full transition-transform duration-300">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6 m-auto stroke-white">
          <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
        </svg>
      </button>
    </div>

    <div id="messages-container" class="flex flex-col gap-y-1 w-full my-1 rounded-lg overflow-auto flex-1 min-h-0">
      <div id="conv" class="grid grid-cols-1 gap-2 p-1"></div>
    </div>

    <div class="flex w-full h-10 shrink-0">
      <input id="chat-input" onkeydown="if(event.key==='Enter') sendMessage()" class="w-full h-full bg-[#ed8a00] rounded-2xl mr-1 focus:bg-[#ffaa00] outline-0 p-2 text-gray-800">
      <button onclick="sendMessage()" class="bg-[#00509f] hover:bg-sky-400 w-12 h-full rounded-full">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6 m-auto stroke-white">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12 59.768 59.768 0 0 1 3.27 20.875L5.999 12Zm0 0h7.5" />
        </svg>
      </button>
    </div>

  </div>

</div>

<script>
  function message({ sender, msg, type, imglink}) {
    const isSent = type === "sent";
    return `
      <div class="w-full flex px-2 gap-1 message-enter ${isSent ? "flex-row-reverse" : ""}">
        <button class="bg-gray-300 h-9 w-9 rounded-full shrink-0 hover:bg-white overflow-hidden hover:scale-105">
			<a href="#"><img class="object-contain m-auto" src=${imglink}></img></a>
		</button>
        <div class="flex flex-col w-full ${isSent ? "items-end text-right" : ""}">
          <a href="#" class="text-xs text-[#ed8a00]">${sender}</a>
          <p class="text-white text-sm text-wrap">${msg}</p>
        </div>
      </div>
    `;
  }

  const demoMsg = {
    sender: "user",
    msg: "message recu la",
    type: "received",
	imglink: "https://machinecurve.com/static/images/thispersondoesnotexist-1-1022x1024.jpg",
  };

  const conv = document.getElementById("conv");
  const messagesContainer = document.getElementById("messages-container");
  const chatInput = document.getElementById("chat-input");

  for (let i = 0; i < 3; i++) {
    conv.innerHTML += message(demoMsg);
  }
  messagesContainer.scrollTop = messagesContainer.scrollHeight;

  function sendMessage() {
    const text = chatInput.value.trim();
    if (!text) return;

    conv.insertAdjacentHTML("beforeend", message({ sender: "Moi", msg: text, type: "sent", imglink: "https://www.vicharkness.co.uk/wp-content/uploads/2019/03/aiface.png" }));
    chatInput.value = "";
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
  }

  let reduced = false;
  const chatbox = document.getElementById("chatbox");
  const toggleBtn = document.getElementById("toggle-btn");

  function reduceChat() {
    reduced = !reduced;
    if (reduced) {
      chatbox.classList.remove("h-90", "w-70");
      chatbox.classList.add("h-18", "w-50");
    } else {
      chatbox.classList.remove("h-18", "w-50");
      chatbox.classList.add("h-90", "w-70");
    }
    toggleBtn.classList.toggle("rotate-180");
  }
</script>

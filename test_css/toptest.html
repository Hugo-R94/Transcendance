<style>
  .balatro {
    position: relative;
    overflow: hidden;
    border-radius: 12px;
  }

  @keyframes card-wobble {
    0%, 100% {
      transform: scale(1.2) rotate(-3deg);
    }
    50% {
      transform: scale(1.2) rotate(3deg);
    }
  }

  @keyframes holo-shift {
    0% {
      transform: translateX(-100%) rotate(20deg);
    }
    100% {
      transform: translateX(100%) rotate(20deg);
    }
  }

  .balatro::before {
    content: "";
    position: absolute;
    inset: -50%;
    background: linear-gradient(
      120deg,
      transparent 20%,
      rgba(255, 0, 255, 0.25) 30%,
      rgba(0, 255, 255, 0.35) 40%,
      rgba(255, 255, 255, 0.6) 50%,
      rgba(255, 255, 0, 0.25) 60%,
      transparent 80%
    );
    opacity: 0;
    pointer-events: none;
  }

  .balatro:hover {
    animation: card-wobble 2.4s ease-in-out infinite;
    outline: 2px solid white;
    box-shadow:
      0 35px 70px -15px rgb(0 0 0 / 0.5),
      0 0 20px rgba(0,255,255,.4),
      0 0 40px rgba(255,0,255,.3);
    z-index: 20;
  }

  .balatro:hover::before {
    opacity: 1;
    animation: holo-shift 2s linear infinite;
  }
</style>

<script>
  function fiche({ image, titre, genre }) {
    return `
      <div class="balatro fiche-card relative w-full aspect-[3/4] rounded-lg overflow-hidden shadow-sm shadow-blue-300 hover:shadow-2xl hover:scale-110 transitionshadow">
        <img class="absolute inset-0 h-full w-full object-cover" src="${image}" alt="" />
        <div class="absolute bottom-0 w-full p-[1.2vw]">
          <h1 class="text-white font-bold" style="font-size: clamp(0.75rem, 1.6vw, 1.5rem);">${titre}</h1>
          <p class="text-gray-300" style="font-size: clamp(0.5rem, 0.8vw, 0.75rem);">${genre}</p>
        </div>
      </div>
    `;
  }

  const jeu = {
    image: "https://images.igdb.com/igdb/image/upload/t_cover_big/co670h.webp",
    titre: "Baldur's gate",
    genre: "RPG",
  };

  const grid = document.getElementById("grid");
  for (let i = 0; i < 50; i++) {
    grid.innerHTML += fiche(jeu);
  }
</script>


<script>
  function message({ sender, msg, type, imglink}) {
    const isSent = type === "sent";
    return `
      <div class="w-full flex px-2 gap-1 message-enter ${isSent ? "flex-row-reverse" : ""}">
        <button class="bg-gray-300 h-9 w-9 rounded-full shrink-0 hover:bg-white overflow-hidden hover:scale-105">
			<a href="#"><img class="object-contain m-auto" src=${imglink}></img></a>
		</button>
        <div class="flex flex-col w-full ${isSent ? "items-end text-right" : ""}">
          <a href="#" class="text-xs text-[#ed8a00]">${sender}</a>
          <p class="text-white text-sm text-wrap">${msg}</p>
        </div>
      </div>
    `;
  }

  const demoMsg = {
    sender: "user",
    msg: "message recu la",
    type: "received",
	imglink: "https://machinecurve.com/static/images/thispersondoesnotexist-1-1022x1024.jpg",
  };

  const conv = document.getElementById("conv");
  const messagesContainer = document.getElementById("messages-container");
  const chatInput = document.getElementById("chat-input");

  for (let i = 0; i < 3; i++) {
    conv.innerHTML += message(demoMsg);
  }
  messagesContainer.scrollTop = messagesContainer.scrollHeight;

  function sendMessage() {
    const text = chatInput.value.trim();
    if (!text) return;

    conv.insertAdjacentHTML("beforeend", message({ sender: "Moi", msg: text, type: "sent", imglink: "https://www.vicharkness.co.uk/wp-content/uploads/2019/03/aiface.png" }));
    chatInput.value = "";
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
  }

  let reduced = false;
  const chatbox = document.getElementById("chatbox");
  const toggleBtn = document.getElementById("toggle-btn");

  function reduceChat() {
    reduced = !reduced;
    if (reduced) {
      chatbox.classList.remove("h-90", "w-70");
      chatbox.classList.add("h-18", "w-50");
    } else {
      chatbox.classList.remove("h-18", "w-50");
      chatbox.classList.add("h-90", "w-70");
    }
    toggleBtn.classList.toggle("rotate-180");
  }
</script>

<style>
  .balatro {
    position: relative;
    overflow: hidden;
    border-radius: 12px;
  }

  @keyframes card-wobble {
    0%, 100% {
      transform: scale(1.2) rotate(-3deg);
    }
    50% {
      transform: scale(1.2) rotate(3deg);
    }
  }

  @keyframes holo-shift {
    0% {
      transform: translateX(-100%) rotate(20deg);
    }
    100% {
      transform: translateX(100%) rotate(20deg);
    }
  }

  .balatro::before {
    content: "";
    position: absolute;
    inset: -50%;
    background: linear-gradient(
      120deg,
      transparent 20%,
      rgba(255, 0, 255, 0.25) 30%,
      rgba(0, 255, 255, 0.35) 40%,
      rgba(255, 255, 255, 0.6) 50%,
      rgba(255, 255, 0, 0.25) 60%,
      transparent 80%
    );
    opacity: 0;
    pointer-events: none;
  }

  .balatro:hover {
    animation: card-wobble 2.4s ease-in-out infinite;
    outline: 2px solid white;
    box-shadow:
      0 35px 70px -15px rgb(0 0 0 / 0.5),
      0 0 20px rgba(0,255,255,.4),
      0 0 40px rgba(255,0,255,.3);
    z-index: 20;
  }

  .balatro:hover::before {
    opacity: 1;
    animation: holo-shift 2s linear infinite;
  }
</style>

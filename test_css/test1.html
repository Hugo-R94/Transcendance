<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<div class="relative grid min-h-screen place-items-center bg-black">
  <div class="w-full max-w-lg bg-sky-900 p-8 rounded-xl shadow-2xl shadow-blue-300">
    <h1 class="text-blue-500 text-2xl font-bold border-2 p-1.5 rounded-2xl inline-block">
      TodoList.
    </h1>

    <div class="mt-8">
      <p class="mb-2 text-white">What do I have to do ?</p>

      <form id="todo-form" class="flex gap-2 mb-5 text-white">
        <input
          id="todo-input"
          type="text"
          placeholder="Ajouter une tâche..."
          class="flex-1 h-10 px-4 rounded-2xl border border-gray-300 text-white focus:outline-none focus:ring-2 focus:ring-sky-500"
        />

        <button
          type="submit"
          class="px-4 bg-blue-500 hover:scale-110 hover:bg-blue-300 text-black font-bold rounded-2xl"
        >
          Add
        </button>
      </form>

      <div
        id="todo-list"
        class="flex flex-col gap-2 p-2 rounded-2xl bg-sky-950 min-h-32"
      >
      </div>
    </div>
  </div>
</div>

<script>
  const form = document.getElementById("todo-form");
  const input = document.getElementById("todo-input");
  const list = document.getElementById("todo-list");

  form.addEventListener("submit", (e) => {
    e.preventDefault();

    const text = input.value.trim();

    if (!text) return;

    const task = document.createElement("div");
    task.className =
      "flex h-10 w-full bg-blue-100 p-1 rounded-lg items-center";

    task.innerHTML = `
      <p class="ml-2 flex-1 truncate">${text}</p>
      <button
        class="w-8 h-8 bg-amber-800 hover:bg-red-500 rounded-lg ml-auto text-white"
      >
        ✕
      </button>
    `;

    task.querySelector("button").addEventListener("click", () => {
      task.remove();
    });

    list.appendChild(task);
    input.value = "";
    input.focus();
  });
</script>
